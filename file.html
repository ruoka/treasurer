<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Handling Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        #fileContent {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="container">
        <button id="openFile">Open JSON File</button>
        <button id="saveFile">Save JSON File</button>
        <div id="fileContent"></div>
    </div>

    <script>
        async function handleFileOpen() {
            try {
                const [fileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'JSON Files',
                        accept: {
                            'application/json': ['.json'],
                        },
                    }],
                });
                
                const file = await fileHandle.getFile();
                const content = await file.text();
                const jsonData = JSON.parse(content);

                document.getElementById('fileContent').innerText = JSON.stringify(jsonData, null, 2);
                console.log('File opened:', jsonData);
                
            } catch (error) {
                console.error('Error opening file:', error);
            }
        }

        async function handleFileSave() {
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: 'example.json',
                    types: [{
                        description: 'JSON Files',
                        accept: {
                            'application/json': ['.json'],
                        }
                    }]
                });
                
                const writable = await handle.createWritable();

                // Here we're saving some dummy data. In a real scenario, this would be your data to save.
                const dataToSave = {
                    "example": "This is an example JSON data to save."
                };
                await writable.write(JSON.stringify(dataToSave, null, 2));
                
                await writable.close();

                console.log('File saved successfully');
            } catch (error) {
                console.error('Error saving file:', error);
            }
        }

        document.getElementById('openFile').addEventListener('click', handleFileOpen);
        document.getElementById('saveFile').addEventListener('click', handleFileSave);
    </script>
</body>
</html>
