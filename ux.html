<!DOCTYPE html>
<html lang="en">

<head>
    <title>Treasurer</title>
    <link href="ux.css" rel="stylesheet" type="text/css">
    <script src="./treasurer.js" type="module"></script>
</head>

<body>

    <button id="save" type="button">Save</button>

    <form id="transaction">

        <fieldset>
            <legend>Transaction</legend>

            <fieldset>
                <legend>Header</legend>
                <label for="created">Created</label><input id="created" type="date" required>
                <br>
                <label for="reference">Reference</label><input id="reference" type="text" required>
                <br>
                <label for="note">Note</label><br><textarea id="note"></textarea>
                <br>
                <input id="file" type="file">
                <br>
            </fieldset>

            <fieldset id="entries">
                <legend>Entries</legend>
                <button id="add" type="button">Add</button>

                <div id="entry_set">
                    <select id="entry">
                        <option value="credit">Credit</option>
                        <option value="debit" selected>Debit</option>
                    </select>
                    <input id="date" type="date" required>
                    <select id="account">
                        <optgroup label="Assets">
                            <option value="bank deposits" selected>bank deposits</option>
                        </optgroup>
                        <optgroup label="Equity">
                            <option value="previous years' profit or loss">previous years' profit or loss</option>
                        </optgroup>
                        <optgroup label="Liabilities">
                            <option value="debt">debt</option>
                        </optgroup>
                        <optgroup label="Revenue">
                            <option value="fees">fees</option>
                        </optgroup>
                        <optgroup label="Expenses">
                            <option value="costs">costs</option>
                        </optgroup>
                    </select>
                    <input id="amount" type="number" min="0.01" step="0.01" required>&euro;
                </div>

                <div id="contra_entry_set">
                    <select name="entry">
                        <option value="credit" selected>Credit</option>
                        <option value="debit">Debit</option>
                    </select>
                    <input name="date" type="date" required>
                    <select name="account">
                        <optgroup label="Assets">
                            <option value="bank deposits">bank deposits</option>
                        </optgroup>
                        <optgroup label="Equity">
                            <option value="previous years' profit or loss">previous years' profit or loss</option>
                        </optgroup>
                        <optgroup label="Liabilities">
                            <option value="debt">debt</option>
                        </optgroup>
                        <optgroup label="Revenue">
                            <option value="fees">fees</option>
                            <option value="dues" selected>dues</option>
                        </optgroup>
                        <optgroup label="Expenses">
                            <option value="costs">costs</option>
                        </optgroup>
                    </select>
                    <input name="amount" type="number" min="0.01" step="0.01" required>&euro;
                </div>

            </fieldset>
            <input id="submit" type="submit" value="Submit">
            <input id="reset" type="reset" value="Reset">
        </fieldset>
    </form>

    <table id="balance">
        <caption>Balance</caption>
        <thead>
            <tr>
                <th>Account</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody/>
    </table>

    <table id="ledger">
        <caption>Ledger</caption>
        <thead>
            <tr>
                <th>Account</th>
                <th>Date</th>
                <th>Reference</th>
                <th>Entry</th>
                <th>Amount</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody/>
    </table>

    <table id="journal">
        <caption>Journal</caption>
        <thead>
            <tr>
                <th>Date</th>
                <th>Account</th>
                <th>Reference</th>
                <th>Entry</th>
                <th>Amount</th>
            </tr>
            <tbody/>
        </tbody>
    </table>

</body>

</html>
