<!DOCTYPE html>
<html lang="en">

<head>
    <title>Treasurer</title>
    <link href="ux.css" rel="stylesheet" type="text/css">
    <script src="./treasurer.js" type="module"></script>
</head>

<body>

    <button id="save" type="button">Save</button>

    <form id="transaction">

        <fieldset>
            <legend>Transaction</legend>

            <fieldset>
                <legend>Header</legend>
                <input id="number" type="number" value=0 hidden>
                <label for="created">Created</label><input id="created" type="date" required>
                <br>
                <label for="reference">Reference</label><input id="reference" type="text" required>
                <br>
                <label for="note">Note</label><br><textarea id="note"></textarea>
                <br>
                <input id="file" type="file">
                <br>
            </fieldset>

            <fieldset id="entries">
                <legend>Entries</legend>
                <button id="add" type="button">Add</button>

                <div id="entry_set">
                    <select id="entry">
                        <option value="credit">Credit</option>
                        <option value="debit" selected>Debit</option>
                    </select>
                    <input id="date" type="date" required/>
                    <select id="account"><!--javascript will add the options here--></select>
                    <input id="amount" type="number" min="0.01" step="0.01" required/>&euro;
                </div>

                <div id="contra_entry_set">
                    <select name="entry">
                        <option value="credit" selected>Credit</option>
                        <option value="debit">Debit</option>
                    </select>
                    <input name="date" type="date" required/>
                    <select name="account" class="accounts"><!--javascript will add the options here--></select>
                    <input name="amount" type="number" min="0.01" step="0.01" required/>&euro;
                </div>

            </fieldset>
            <input id="submit" type="submit" value="Submit">
            <input id="reset" type="reset" value="Reset">
            <label for="update">Update</label>
            <input id="update" type="checkbox">
        </fieldset>
    </form>

    <br>

    <table id="balance">
        <caption>Balance Sheet</caption>
        <thead>
            <tr>
                <th colspan="2">Account</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody><!--javascript will add the rows here--></tbody>
    </table>

    <br>

    <table id="PnL">
        <caption>Profit and Loss</caption>
        <thead>
            <tr>
                <th colspan="2">Account</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody><!--javascript will add the rows here--></tbody>
    </table>
 
    <br>
 
    <table id="journal">
        <caption>Journal</caption>
        <thead>
            <tr>
                <th>No</th>
                <th>Date</th>
                <th>Account</th>
                <th>Entry</th>
                <th>Amount</th>
                <th></th>
                <th>Reference</th>
                <th>Note</th>
            </tr>
            <tbody><!--javascript will add the rows here--></tbody>
        </tbody>
    </table>

    <br>

    <table id="ledger">
        <caption>General Ledger</caption>
        <thead>
            <tr>
                <th>No</th>
                <th>Date</th>
                <th>Account</th>
                <th>Entry</th>
                <th>Amount</th>
                <th>Subtotal</th>
                <th>Reference</th>
                <th>Note</th>
            </tr>
        </thead>
        <tbody><!--javascript will add the rows here--></tbody>
    </table>

</body>

</html>
