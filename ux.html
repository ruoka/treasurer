<!DOCTYPE html>
<html lang="en">

<head>
    <title>Rahuri</title>
    <link href="ux.css" rel="stylesheet" type="text/css">
    <script src="./treasurer.js" type="module"></script>
</head>

<body>

    <button id="open" type="button">Avaa</button>
    <button id="save" type="button">Tallenna</button>

    <form id="transaction">

        <fieldset>
            <legend>Tapahtuman</legend>

            <fieldset>
                <legend>Otsikon</legend>
                <input id="number" type="number" value=0 hidden>
                <label for="reference">Viite</label><input id="reference" type="text" required>
                <label for="created">Päivä</label><input id="created" type="date" required>
                <label for="note">Selite</label><input id="note">
                <br>
            </fieldset>

            <fieldset id="entries">
                <legend>Rivit</legend>
                <button id="add" type="button">Lisää</button>

                <div id="entry_set">
                    <select id="entry">
                        <option value="credit">Credit</option>
                        <option value="debit" selected>Debit</option>
                    </select>
                    <input id="date" type="date" required>
                    <select id="account"><!--javascript will add the options here--></select>
                    <input id="amount" type="number" min="0.01" step="0.01" required>&euro;
                </div>

                <div id="contra_entry_set">
                    <select name="entry">
                        <option value="credit" selected>Credit</option>
                        <option value="debit">Debit</option>
                    </select>
                    <input name="date" type="date" required>
                    <select name="account" class="accounts"><!--javascript will add the options here--></select>
                    <input name="amount" type="number" min="0.01" step="0.01" required>&euro;
                </div>

            </fieldset>
            <input id="submit" type="submit" value="Hyväksy">
            <input id="reset" type="reset" value="Nollaa">
            <label for="update">Päivitä</label>
            <input id="update" type="checkbox">
        </fieldset>
    </form>

    <br>

    <table id="balance">
        <caption>TASE</caption>
        <thead>
            <tr>
                <th>Tili</th>
                <th>Selite</th>
                <th>Summa</th>
            </tr>
        </thead>
        <tbody><!--javascript will add the rows here--></tbody>
    </table>

    <br>

    <table id="income">
        <caption>Tuloslaskelma</caption>
        <thead>
            <tr>
                <th>Tili</th>
                <th>Selite</th>
                <th>Summa</th>
            </tr>
        </thead>
        <tbody><!--javascript will add the rows here--></tbody>
    </table>
 
    <br>
 
    <table id="journal">
        <caption>Päiväkirja</caption>
        <thead>
            <tr>
                <th>No</th>
                <th>Date</th>
                <th>Account</th>
                <th>Entry</th>
                <th>Amount</th>
                <th></th>
                <th>Reference</th>
                <th>Note</th>
            </tr>
        </thead>
        <tbody><!--javascript will add the rows here--></tbody>
    </table>

    <br>

    <table id="ledger">
        <caption>Tilikirja</caption>
        <thead>
            <tr>
                <th>No</th>
                <th>Date</th>
                <th>Account</th>
                <th>Entry</th>
                <th>Amount</th>
                <th>Subtotal</th>
                <th>Reference</th>
                <th>Note</th>
            </tr>
        </thead>
        <tbody><!--javascript will add the rows here--></tbody>
    </table>

</body>

</html>
